version: "3.9"

services:
  db:
    image: postgres:15
    container_name: petsync_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: petsync
      POSTGRES_USER: petsync
      POSTGRES_PASSWORD: petsync_password
    volumes:
      - petsync_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U petsync -d petsync"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - petsync_net

  backend:
    build:
      context: ./backend
    container_name: petsync_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_DB: petsync
      POSTGRES_USER: petsync
      POSTGRES_PASSWORD: petsync_password
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      DJANGO_SETTINGS_MODULE: core.settings
    ports:
      - "8225:8000"
    networks:
      - petsync_net

  frontend:
    build:
      context: ./frontend
    container_name: petsync_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      API_URL: "http://petsync_backend:8000"
    ports:
      - "4200:80"
    networks:
      - petsync_net

volumes:
  petsync_db_data:

networks:
  petsync_net:
    driver: bridge
